<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloc-Coin | Admin Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-pages.js"></script>
  <style>
    body{margin:0;font-family:'Crimson Text',serif;background:#060e1f;color:#e8dcc8}
    .wrap{max-width:1080px;margin:0 auto;padding:24px}
    .card{border:1px solid rgba(240,192,64,.2);background:rgba(10,18,35,.9);padding:16px;margin-bottom:12px}
    h1,h2{font-family:'Cinzel',serif;color:#f0c040;margin:0 0 10px}
    .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .metric{border:1px solid rgba(255,255,255,.12);padding:10px;background:rgba(8,16,30,.8)}
    .k{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:#9a8a72}
    .v{font-size:1rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;border:1px solid rgba(240,192,64,.3);background:transparent;color:#e8dcc8;text-decoration:none;cursor:pointer}
    @media(max-width:900px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card"><h1>Admin Stats</h1><div class="actions"><a class="btn" href="Adminpanel.html">Adminpanel</a><a class="btn" href="AdminCommandes.html">Commandes</a><a class="btn" href="AdminModeration.html">Moderation</a><a class="btn" href="AdminLogs.html">Logs</a></div></section>
    <section class="card" id="locked" style="display:none"><h2>Acces bloque</h2><p>Debloque d'abord le 2FA secondaire dans Adminpanel.</p><a class="btn" href="Adminpanel.html">Aller a Adminpanel</a></section>
    <section class="card" id="content" style="display:none">
      <h2>Statistiques</h2>
      <div class="row">
        <div class="metric"><div class="k">Compte admin</div><div class="v" id="m-email">-</div></div>
        <div class="metric"><div class="k">Comptes inscrits</div><div class="v" id="m-profils">...</div></div>
        <div class="metric"><div class="k">Cooldown support</div><div class="v" id="m-support">-</div></div>
        <div class="metric"><div class="k">Logs admin</div><div class="v" id="m-logs">0</div></div>
      </div>
    </section>
  </main>
  <script>
    const client = createAdminClient();
    function fmt(ms){const s=Math.max(0,Math.floor(ms/1000));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
    (async()=>{
      const gate = await requireAdminUnlocked(client);
      if(!gate.ok){document.getElementById('locked').style.display='block';return;}
      document.getElementById('content').style.display='block';
      document.getElementById('m-email').textContent = gate.email;
      const logs = readAdminLogs();
      document.getElementById('m-logs').textContent = String(logs.length);
      const supportUntil = Number(localStorage.getItem('bloccoin_support_cooldown_until')||0);
      document.getElementById('m-support').textContent = supportUntil>Date.now()?fmt(supportUntil-Date.now()):'Disponible';
      try{
        const r = await fetch(`${ADMIN_CORE.SUPABASE_URL}/rest/v1/profils?select=id`,{method:'HEAD',headers:{apikey:ADMIN_CORE.SUPABASE_ANON,Authorization:`Bearer ${gate.session.access_token}`,Prefer:'count=exact'}});
        const cr = r.headers.get('content-range')||'';
        const total = cr.includes('/')?cr.split('/').pop():'Indispo';
        document.getElementById('m-profils').textContent = total;
      }catch(_){document.getElementById('m-profils').textContent='Indispo';}
      addAdminLog('page','Ouverture AdminStats');
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Bloc-Coin | Admin Moderation</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet" /><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="admin-pages.js"></script><style>body{margin:0;font-family:'Crimson Text',serif;background:#060e1f;color:#e8dcc8}.wrap{max-width:1080px;margin:0 auto;padding:24px}.card{border:1px solid rgba(240,192,64,.2);background:rgba(10,18,35,.9);padding:16px;margin-bottom:12px}h1{font-family:'Cinzel',serif;color:#f0c040;margin:0 0 10px}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.i{width:100%;padding:10px;border:1px solid rgba(255,255,255,.2);background:#08142a;color:#e8dcc8}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;border:1px solid rgba(240,192,64,.3);background:transparent;color:#e8dcc8;text-decoration:none;cursor:pointer}.mono{font-family:'Courier New',monospace;background:#08142a;border:1px solid rgba(255,255,255,.2);padding:10px;margin-top:10px;white-space:pre-wrap}@media(max-width:900px){.row{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Admin Moderation</h1><div class="actions"><a class="btn" href="Adminpanel.html">Adminpanel</a><a class="btn" href="AdminStats.html">Stats</a><a class="btn" href="AdminCommandes.html">Commandes</a><a class="btn" href="AdminLogs.html">Logs</a></div></section><section class="card" id="locked" style="display:none"><p>Debloque d'abord le 2FA secondaire dans Adminpanel.</p><a class="btn" href="Adminpanel.html">Aller a Adminpanel</a></section><section class="card" id="content" style="display:none"><div class="row"><input id="target" class="i" placeholder="Pseudo joueur" /><input id="reason" class="i" placeholder="Raison" /></div><div class="actions"><button class="btn" id="b-kick">/kick</button><button class="btn" id="b-ban">/ban</button><button class="btn" id="b-tempban">/tempban</button><button class="btn" id="b-copy">Copier</button></div><div class="mono" id="out">/kick joueur raison</div></section></main><script>const client=createAdminClient();(async()=>{const gate=await requireAdminUnlocked(client);if(!gate.ok){document.getElementById('locked').style.display='block';return;}document.getElementById('content').style.display='block';addAdminLog('page','Ouverture AdminModeration');})();const t=document.getElementById('target'),r=document.getElementById('reason'),o=document.getElementById('out');document.getElementById('b-kick').onclick=()=>{o.textContent=`/kick ${(t.value||'joueur').trim()} ${(r.value||'Regles du serveur').trim()}`;addAdminLog('moderation','Generation /kick');};document.getElementById('b-ban').onclick=()=>{o.textContent=`/ban ${(t.value||'joueur').trim()} ${(r.value||'Regles du serveur').trim()}`;addAdminLog('moderation','Generation /ban');};document.getElementById('b-tempban').onclick=()=>{o.textContent=`/tempban ${(t.value||'joueur').trim()} 1d ${(r.value||'Regles du serveur').trim()}`;addAdminLog('moderation','Generation /tempban');};document.getElementById('b-copy').onclick=async()=>{try{await navigator.clipboard.writeText(o.textContent||'');}catch(_){}addAdminLog('moderation','Copie commande moderation');};</script></body></html>

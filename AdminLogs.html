<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloc-Coin | Admin Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-pages.js"></script>
  <style>
    body { margin: 0; font-family: 'Crimson Text', serif; background: #060e1f; color: #e8dcc8; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .card { border: 1px solid rgba(240,192,64,.2); background: rgba(10,18,35,.9); padding: 16px; margin-bottom: 12px; }
    h1 { font-family: 'Cinzel', serif; color: #f0c040; margin: 0 0 10px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 8px 12px;
      border: 1px solid rgba(240,192,64,.3);
      background: transparent;
      color: #e8dcc8;
      text-decoration: none;
      cursor: pointer;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid rgba(255,255,255,.15); padding: 8px; text-align: left; vertical-align: top; }
    th { font-family: 'Cinzel', serif; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: #ffe87a; }
    td { font-size: .95rem; }
    .muted { color: #9a8a72; }
    .mono { font-family: 'Courier New', monospace; font-size: .82rem; color: #d4e2ff; }
    @media (max-width: 980px) {
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { margin-bottom: 10px; border: 1px solid rgba(255,255,255,.2); }
      td { border: 0; border-bottom: 1px solid rgba(255,255,255,.1); }
      td:last-child { border-bottom: 0; }
      td::before { content: attr(data-label); display: block; font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: #9a8a72; margin-bottom: 4px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Admin Logs</h1>
      <div class="actions">
        <a class="btn" href="Adminpanel.html">Adminpanel</a>
        <a class="btn" href="AdminStats.html">Stats</a>
        <a class="btn" href="AdminCommandes.html">Commandes</a>
        <a class="btn" href="AdminModeration.html">Moderation</a>
        <button class="btn" id="clear">Vider logs</button>
      </div>
    </section>

    <section class="card" id="locked" style="display:none">
      <p class="muted">Debloque d'abord le 2FA secondaire dans Adminpanel.</p>
      <a class="btn" href="Adminpanel.html">Aller a Adminpanel</a>
    </section>

    <section class="card" id="content" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Action</th>
            <th>Details</th>
            <th>Email</th>
            <th>IP (masquee)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const client = createAdminClient();

    function render() {
      const list = readAdminLogs();
      const tbody = document.getElementById('tbody');

      tbody.innerHTML = list.map((it) => {
        const date = it?.ts ? new Date(it.ts).toLocaleString('fr-FR') : '-';
        const action = it?.action || '';
        const details = it?.details || '';
        const email = it?.actorEmail || 'inconnu';
        const ip = it?.actorIp || 'IP indisponible';

        return `<tr>
          <td data-label="Date">${date}</td>
          <td data-label="Action">${action}</td>
          <td data-label="Details">${details}</td>
          <td data-label="Email" class="mono">${email}</td>
          <td data-label="IP" class="mono">${ip}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="5">Aucun log</td></tr>';
    }

    (async () => {
      const gate = await requireAdminUnlocked(client);
      if (!gate.ok) {
        document.getElementById('locked').style.display = 'block';
        return;
      }

      document.getElementById('content').style.display = 'block';
      await addAdminLog('page', 'Ouverture AdminLogs');
      render();
    })();

    document.getElementById('clear').onclick = async () => {
      localStorage.setItem(ADMIN_CORE.LOG_KEY, '[]');
      await addAdminLog('logs', 'Nettoyage logs');
      render();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion en cours…</title>
  <style>
    body {
      margin: 0;
      background: #060e1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cinzel', serif;
      color: #f0c040;
    }
    .msg {
      text-align: center;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .coin { font-size: 2.5rem; display: block; margin-bottom: 18px; }
    .txt { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: #9a8a72; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="msg">
    <span class="coin">🪙</span>
    <span class="txt">Connexion en cours…</span>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _sb = supabase.createClient(
      'https://cimyrkybpnssyeyobyrh.supabase.co',
      'sb_publishable_XAfHoy6vcPskEW1vNJaAkA_92iGeE-v',
      {
        auth: {
          flowType: 'pkce',
          detectSessionInUrl: true,
          persistSession: true,
          autoRefreshToken: true
        }
      }
    );

    function rentrerAccueil() {
      window.location.replace('./index.html');
    }

    // Échange explicite du code PKCE → crée la session dans localStorage
    (async () => {
      const code = new URLSearchParams(window.location.search).get('code');
      if (code) {
        try {
          await _sb.auth.exchangeCodeForSession(code);
        } catch (e) {
          console.error('Erreur échange PKCE:', e);
        }
      }
      rentrerAccueil();
    })();
  </script>
</body>
</html>

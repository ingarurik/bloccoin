<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion en cours…</title>
  <style>
    body {
      margin: 0;
      background: #060e1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cinzel', serif;
      color: #f0c040;
    }
    .msg {
      text-align: center;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .coin { font-size: 2.5rem; display: block; margin-bottom: 18px; }
    .txt { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: #9a8a72; }
    .err {
      margin-top: 14px;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      color: #ff9e9e;
      max-width: 680px;
      text-align: center;
      line-height: 1.4;
      display: none;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="msg">
    <span class="coin">🪙</span>
    <span class="txt">Connexion en cours…</span>
    <div class="err" id="auth-err"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _sb = supabase.createClient(
      'https://cimyrkybpnssyeyobyrh.supabase.co',
      'sb_publishable_XAfHoy6vcPskEW1vNJaAkA_92iGeE-v',
      {
        auth: {
          flowType: 'pkce',
          detectSessionInUrl: false,
          persistSession: true,
          autoRefreshToken: true
        }
      }
    );

    function rentrerAccueil() {
      window.location.replace(`./index.html?auth_return=1&ts=${Date.now()}`);
    }

    function afficherErreurCallback(message) {
      const el = document.getElementById('auth-err');
      if (!el) return;
      el.textContent = message;
      el.style.display = 'block';
    }

    // Garde-fou long: on laisse largement le temps a l'echange PKCE.
    const hardTimeout = setTimeout(rentrerAccueil, 20000);

    // Échange explicite du code PKCE → crée la session dans localStorage
    (async () => {
      const code = new URLSearchParams(window.location.search).get('code');
      if (code) {
        try {
          const { error } = await _sb.auth.exchangeCodeForSession(code);
          if (error) {
            throw error;
          }
        } catch (e) {
          console.error('Erreur échange PKCE:', e);
          afficherErreurCallback('Connexion OAuth interrompue. Reessaie dans 2 secondes...');
          await new Promise((resolve) => setTimeout(resolve, 1800));
        }
      } else {
        // Cas de secours: si pas de code present, on laisse Supabase relire une session existante.
        await _sb.auth.getSession();
      }
    })().finally(() => {
      clearTimeout(hardTimeout);
      rentrerAccueil();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b1224;
      --panel: #101a33;
      --text: #e8dcc8;
      --muted: #a7b3c8;
      --gold: #f0c040;
      --gold-soft: #ffe2a2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Cinzel', serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(240, 192, 64, 0.16), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(68, 124, 255, 0.20), transparent 60%),
        radial-gradient(circle at top, #122041 0%, var(--bg) 55%);
      color: var(--text);
    }

    .card {
      width: min(760px, 100%);
      border: 1px solid rgba(240, 192, 64, 0.25);
      background: rgba(16, 26, 51, 0.92);
      padding: 28px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.5);
      text-align: center;
      backdrop-filter: blur(6px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(240, 192, 64, 0.85) 50%, transparent 100%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.15rem, 2.6vw, 1.6rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border: 1px solid rgba(240, 192, 64, 0.25);
      background: rgba(240, 192, 64, 0.08);
      color: var(--gold-soft);
      font-size: 0.66rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-family: 'Crimson Text', serif;
      font-size: 1.12rem;
      line-height: 1.55;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(240, 192, 64, 0.28);
      background: rgba(240, 192, 64, 0.10);
      color: var(--gold-soft);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      padding: 10px 16px;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: rgba(240, 192, 64, 0.7);
      background: rgba(240, 192, 64, 0.18);
      color: #fff3cf;
    }

    .ok-text {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      color: var(--gold-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #ok { display: none; }
    #ko { display: none; }
  </style>
</head>
<body>
  <div class="card" id="ko">
    <div class="eyebrow">Bloc-Coin Vote</div>
    <h1>Vote</h1>
    <p>Merci de vous connecter pour acceder a cette page</p>
    <div class="actions">
      <a class="btn" href="index.html">Retour a l'accueil</a>
    </div>
  </div>

  <div class="card" id="ok">
    <div class="eyebrow">Bloc-Coin Vote</div>
    <h1>Vote</h1>
    <p class="ok-text">salut</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://cimyrkybpnssyeyobyrh.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_XAfHoy6vcPskEW1vNJaAkA_92iGeE-v';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: {
        flowType: 'pkce',
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        multiTab: false,
        storageKey: 'sb-cimyrkybpnssyeyobyrh-auth-token'
      }
    });

    async function afficherSelonConnexion() {
      const ok = document.getElementById('ok');
      const ko = document.getElementById('ko');

      let connecte = false;
      try {
        const { data: { session } } = await client.auth.getSession();
        connecte = !!(session && session.user);
      } catch (_) {
        connecte = false;
      }

      ok.style.display = connecte ? 'block' : 'none';
      ko.style.display = connecte ? 'none' : 'block';
    }

    client.auth.onAuthStateChange(() => {
      afficherSelonConnexion();
    });

    afficherSelonConnexion();
  </script>
</body>
</html>
